<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <title>Sanguchetto</title>
</head>
<body>

<nav th:replace="/admin/templateView :: navbarTemplate">

</nav>

<div class="container-fluid">
    <div class="row justify-content-center">
        <aside class="col-4 bg-dark">
            <h1>Aside</h1>
        </aside>
        <section class="col-8">
            <h1 id="testValue"></h1>
            <article>
                <div class = "row justify-content-center">
                    <a type="button" class="btn btn-dark col-2" th:href="@{/sanguchetto/admin/product/addIngredient}">Agregar</a>
                    <form class="d-flex col-4" role="search" th:action="@{/sanguchetto/admin/product/getIngredient}" th:object="${ingredient}" method="post">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" th:field="*{name}">
                        <button class="btn btn-outline-primary" type="submit">Search</button>
                    </form>
                </div>
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th scope="col">Nombre</th>
                        <th scope="col">Precio</th>
                        <th scope="col">Stock</th>
                        <th scope="col">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ingredient : ${ingredients}">
                        <td th:text="${ingredient.name}">Mark</td>
                        <td th:text="${ingredient.price}">Otto</td>
                        <td th:text="${ingredient.stock}">@mdo</td>
                        <td>
                            <a th:href="@{/sanguchetto/admin/product/editIngredient/{id}(id=${ingredient.id})}" type="button">Editar</a>
                            <button>Eliminar</button>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </article>
        </section>
    </div>
</div>

<footer th:replace="/admin/templateView :: footer">

</footer>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.min.js" integrity="sha384-tsQFqpEReu7ZLhBV2VZlAu7zcOV+rXbYlF2cqB8txI/8aZajjp4Bqd+V6D5IgvKT" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
<script type="text/javascript" src="/js/ingredientJS/ingredient.js"></script>

</body>
</html>
