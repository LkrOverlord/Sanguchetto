<!DOCTYPE html>
<html lang="en">
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">

    <title>Sanguchetto</title>
</head>
<body>

<nav th:replace="/admin/templateView :: navbarTemplate">

</nav>

<div class="container-fluid">
    <div class="row justify-content-center">
        <section class="col-8">
            <article>
                <form action="#" th:action="@{/sanguchetto/admin/product/edit}"
                      th:object="${product}" th:method="put">

                    <!-- Hidden input  -->
                        <input type="hidden" th:field="*{id}">
                    <!-- End hidden input -->

                    <div class="form-group">
                        <label for="productName">Nombre</label>
                        <input type="text" class="form-control" id="productName"
                               placeholder="Ingrese el nombre del producto" th:field="*{name}">
                    </div>
                    <div class="form-group">
                        <label for="productPrice">Precio</label>
                        <input type="number" class="form-control" id="productPrice"
                               placeholder="Ingrese el precio" step=".01" th:field="*{price}">
                    </div>
                    <div class="form-group">
                        <label for="productStock">Stock</label>
                        <input type="number" class="form-control" id="productStock"
                               placeholder="Ingrese el stock" th:field="*{stock}">
                    </div>
                    <div class="form-group">
                        <label for="productType">Tipo de producto</label>
                        <select class="form-select" aria-label="Default select example" th:field="*{type}" id="productType">
                            <option selected value="">Selecciona producto</option>
                            <option value="INGREDIENT">Ingrediente</option>
                            <option value="CONDIMENT">Condimento</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitForm">Enviar</button>
                </form>
            </article>
        </section>
    </div>
</div>

<footer th:replace="/admin/templateView :: footer">

</footer>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>


</body>
</html>
